name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must be unique, e.g. v2.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag and type
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            prerelease=false
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            prerelease=false
          else
            tag="latest-main"
            prerelease=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Delete previous rolling release (main pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-main --cleanup-tag --yes || true

      - name: Package addon into Blender-installable zip
        run: |
          test -f shape_key_folders/__init__.py
          zip -r shape_key_folders.zip shape_key_folders/ \
            -x 'shape_key_folders/__pycache__/*' \
            -x 'shape_key_folders/**/__pycache__/*' \
            -x 'shape_key_folders/*.pyc'
          unzip -l shape_key_folders.zip

      - name: Verify zip contains updater files
        run: |
          set -e
          unzip -l shape_key_folders.zip | grep -q 'shape_key_folders/__init__.py'
          unzip -l shape_key_folders.zip | grep -q 'shape_key_folders/addon_updater.py'
          unzip -l shape_key_folders.zip | grep -q 'shape_key_folders/addon_updater_ops.py'
          echo "All updater files present in zip."

      - name: Create release with zip attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: shape_key_folders.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
