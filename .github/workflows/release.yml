name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must be unique, e.g. v2.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package addon into Blender-installable zip
        run: |
          mkdir -p staging/shape_key_folders
          cp shape_key_folders.py staging/shape_key_folders/__init__.py
          (cd staging && zip -r ../shape_key_folders.zip shape_key_folders/)
          unzip -l shape_key_folders.zip

      - name: Create release with zip attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: shape_key_folders.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
